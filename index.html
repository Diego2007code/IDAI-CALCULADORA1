           <div class="datos-entrada"> 
    <h1>Calculadora</h1>
        <input type="text" id="numero1" placeholder="Número 1">
        <input type="text" id="numero2" placeholder="Número 2">
        </div>
        
        <div class="botones">
            <button id="sumar" >Suma</button>
            <button id="restar" >Resta</button>
            <button id="multiplicar">Multiplicación</button>
            <button id="dividir">División</button>
        </div>
       
        <div class="datos-repuesta"
        <input type="text" name="resultado" id="resultado" readonly>
        </div>
        <script>
            var btnSumar = document.getElementById("sumar");
            btnSumar.addEventListener("click", function() {
                var numero1 = 0;
                var numero2 = 0;
                numero1=document.getElementById("numero1").value;
                numero2=document.getElementById("numero2").value;
                var resultado = Number(numero1) + Number(numero2);
                document.getElementById("resultado").value = resultado;
                alert("El resultado de la suma es: " + resultado);
            });
            var btnRestar = document.getElementById("restar");
            btnRestar.addEventListener("click", function() {
                var numero1 = 0;
                var numero2 = 0;
                numero1 = Number(document.getElementById("numero1").value);
                numero2 = Number(document.getElementById("numero2").value);
                var resultado = numero1 - numero2;
                document.getElementById("resultado").value = resultado;
            });
            var btnMultiplicar = document.getElementById("multiplicar");
            btnMultiplicar.addEventListener("click", function() {
                var numero1 = 0;
                var numero2 = 0;
                numero1 = Number(document.getElementById("numero1").value);
                numero2 = Number(document.getElementById("numero2").value);
                var resultado = numero1 * numero2;
                document.getElementById("resultado").value = resultado;
                alert("El resultado de la multiplicación es: " + resultado);
            });
            var btnDividir = document.getElementById("dividir");
            btnDividir.addEventListener("click", function() {
                var numero1 = 0;
                var numero2 = 0;
                numero1 = Number(document.getElementById("numero1").value);
                numero2 = Number(document.getElementById("numero2").value);
                var resultado = numero1 / numero2;
                document.getElementById("resultado").value = resultado;
                alert("El resultado de la división es: " + resultado);
            });
        </script>
